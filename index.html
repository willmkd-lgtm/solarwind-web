<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renewables - 신재생에너지 데이터 플랫폼</title>
<meta name="description" content="태양광·풍력 발전사업자를 위한 SMP·REC 가격 정보 플랫폼">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box {
    text-align: center;
    padding: 60px 40px;
    max-width: 600px;
    animation: fadeIn 1s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .emoji {
    font-size: 80px;
    margin-bottom: 24px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  h1 {
    font-size: 56px;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #3b82f6, #10b981);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800;
    letter-spacing: -1px;
  }
  .tagline {
    color: #94a3b8;
    font-size: 20px;
    margin-bottom: 40px;
    font-weight: 400;
  }
  .status {
    display: inline-block;
    background: rgba(16, 185, 129, 0.15);
    border: 1px solid rgba(16, 185, 129, 0.3);
    color: #10b981;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 32px;
  }
  .status .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #10b981;
    border-radius: 50%;
    margin-right: 8px;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .features {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 20px;
  }
  .feature {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px 12px;
    transition: all 0.3s;
  }
  .feature:hover {
    background: rgba(59, 130, 246, 0.1);
    border-color: rgba(59, 130, 246, 0.3);
    transform: translateY(-2px);
  }
  .feature-icon { font-size: 28px; margin-bottom: 8px; }
  .feature-text { font-size: 13px; color: #cbd5e1; }
  .footer {
    margin-top: 48px;
    color: #64748b;
    font-size: 13px;
  }
  .footer a { color: #3b82f6; text-decoration: none; }
  @media (max-width: 600px) {
    h1 { font-size: 40px; }
    .tagline { font-size: 16px; }
    .features { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">⚡</div>
    <h1>Renewables</h1>
    <p class="tagline">신재생 발전사업자를 위한<br>SMP·REC 데이터 플랫폼</p>
    
    <div class="status">
      <span class="dot"></span>서비스 준비 중
    </div>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">실시간 SMP 분석</div>
      </div>
      <div class="feature">
        <div class="feature-icon">♻️</div>
        <div class="feature-text">REC 가격 추적</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔔</div>
        <div class="feature-text">매일 알림 발송</div>
      </div>
    </div>
    
    <div class="footer">
      <p>곧 정식 오픈합니다 · 문의: <a href="mailto:contact@renewables.co.kr">contact@renewables.co.kr</a></p>
    </div>
  </div>
</body>
</html>
